  - id: hints
    title: "Hints"
    summary: "Hint store: hint validation (length, empty skip), idempotent insertion, forward/reverse index, hint queries, integration with batch_coin_states, rollback cleanup."
    status: planned
    paths:
      normative: domains/hints/NORMATIVE.md
