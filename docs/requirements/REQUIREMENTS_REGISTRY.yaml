  - id: concurrency
    title: "Concurrency"
    summary: "Thread safety (Send + Sync), RwLock strategy, MVCC reads during writes, lock-free unspent checks, parallel removal validation."
    status: planned
    paths:
      normative: domains/concurrency/NORMATIVE.md
