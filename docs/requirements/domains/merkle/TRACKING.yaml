    section: "Sparse Merkle Tree"
    summary: "SparseMerkleTree with batch_insert, batch_update, batch_remove, root(); deferred recomputation; 256-level tree"
    status: verified
    spec_ref: "docs/requirements/domains/merkle/specs/MRK-001.md"
    tests:
      - tests/mrk_001_tests.rs
      - vv_req_mrk_001_empty_tree_root_standalone
      - vv_req_mrk_001_batch_insert_single
      - vv_req_mrk_001_batch_insert_multiple
      - vv_req_mrk_001_batch_insert_hundred_single_root_call
      - vv_req_mrk_001_batch_update
      - vv_req_mrk_001_insert_then_remove_equals_empty
      - vv_req_mrk_001_insert_remove_without_intervening_root_still_empty_commitment
      - vv_req_mrk_001_deferred_recomputation
      - vv_req_mrk_001_idempotent_root
      - vv_req_mrk_001_duplicate_insert_error
      - vv_req_mrk_001_remove_missing_error
      - vv_req_mrk_001_batch_update_missing_key_error
      - vv_req_mrk_001_256_level_depth
      - vv_req_mrk_001_idempotent_update
    notes: "Production: `src/merkle/mod.rs` (`SparseMerkleTree`, `MerkleError`, domain-separated hashes, `empty_hash` integration). STR-004 proves the type is on the crate surface via `tests/str_004_tests.rs`."

  - id: MRK-002
    section: "Sparse Merkle Tree"
    summary: "Memoized empty hashes in OnceLock<[Bytes32; 257]> for O(1) empty subtree lookup"
    status: verified
    spec_ref: "docs/requirements/domains/merkle/specs/MRK-002.md"
    tests:
      - tests/mrk_002_tests.rs
      - vv_req_mrk_002_empty_hash_leaf_level
      - vv_req_mrk_002_empty_hash_root_level
      - vv_req_mrk_002_empty_hash_consistency
      - vv_req_mrk_002_empty_hash_o1_lookup
      - vv_req_mrk_002_empty_hash_matches_recursive
      - vv_req_mrk_002_concurrent_reads_match_serial
      - vv_req_mrk_002_empty_hash_panics_above_smt_height
    notes: "Production: `src/merkle/mod.rs` (`EMPTY_HASHES`, `empty_hash`, `get_empty_hashes`). Index 0 = empty leaf; index `SMT_HEIGHT` (256) = empty-tree root; matches MRK-001 `SparseMerkleTree` root contract."

  - id: MRK-003
    section: "Persistent Storage"
    summary: "merkle_nodes CF with dirty node tracking, incremental flush in same WriteBatch, startup loads only root"
    status: verified
    spec_ref: "docs/requirements/domains/merkle/specs/MRK-003.md"
    tests:
      - tests/mrk_003_tests.rs
      - vv_req_mrk_003_dirty_map_populated_after_root
      - vv_req_mrk_003_flush_persists_merkle_rows
      - vv_req_mrk_003_flush_clears_dirty
      - vv_req_mrk_003_atomic_batch_with_coin_records
      - vv_req_mrk_003_load_roundtrip
      - vv_req_mrk_003_load_rejects_tampered_metadata
      - vv_req_mrk_003_load_missing_metadata_fails
      - vv_req_mrk_003_removal_emits_delete_ops
      - vv_req_mrk_003_proof_verifies_after_load
      - vv_req_mrk_003_load_empty_leaves_with_persisted_empty_root
    notes: "Production: `src/merkle/mod.rs` (`dirty_merkle_nodes`, `flush_to_batch`, `load_from_store`, `compute_subtree_hash_core` + `child_path`), `src/merkle/persistent.rs` (metadata key + `MerkleNodePersistOp`). Dirty rows materialize at `root()` recompute (MRK-001 deferred model). MRK-004 lazy sibling reads from `merkle_nodes` CF not implemented in `SparseMerkleTree` yet—proof path still recomputes siblings from the in-memory leaf multiset after `load_from_store`."

