    notes: "Crate-root pub use; decode path uses from_bincode_deserialize; heed/rocksdb From behind features. RollbackAboveTip deferred to API-010 per NORMATIVE."

  - id: API-005
    section: "Block Input Types"
    summary: "BlockData and CoinAddition structs"
    status: verified
    spec_ref: "docs/requirements/domains/crate_api/specs/API-005.md"
    tests:
      - tests/api_005_tests.rs
    notes: >
      BlockData: 9 public fields (height, timestamp, block_hash, parent_hash, additions, removals, coinbase_coins, hints, expected_state_root).
      CoinAddition: coin_id, coin, same_as_parent; CoinAddition::from_coin. Crate-root pub use. Bincode derives for STO-008 path.

  - id: API-006
    section: "Result Types"
    summary: "ApplyBlockResult and RollbackResult structs"
    status: verified
    spec_ref: "docs/requirements/domains/crate_api/specs/API-006.md"
    tests:
      - tests/api_006_tests.rs
    notes: >
      ApplyBlockResult / RollbackResult: NORMATIVE fields + Serialize/Deserialize. CoinStore::apply_block,
      rollback_to_block, rollback_n_blocks: signatures + NotInitialized gate + BLK/RBK stubs (StorageError prefix)
      until pipelines ship.

  - id: API-007
    section: "Statistics"
    summary: "CoinStoreStats struct with 9 fields"
    status: verified
