      - vv_req_api_001_reopen_existing_store
    notes: "7 tests in dedicated file tests/api_001_tests.rs. CoinStore with RocksDB backend, CoinStoreConfig with defaults, CoinStoreError with genesis variants, init_genesis with Merkle tree + all secondary indices, re-open persistence verified."

