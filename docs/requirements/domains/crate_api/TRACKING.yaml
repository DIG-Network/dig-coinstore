items:
  - id: API-001
    section: "Construction"
    summary: "CoinStore::new(), CoinStore::with_config(), init_genesis() constructors"
    status: verified
    spec_ref: "docs/requirements/domains/crate_api/specs/API-001.md"
    tests:
      - vv_req_api_001_new_returns_ok
      - vv_req_api_001_with_config_returns_ok
      - vv_req_api_001_empty_before_genesis
      - vv_req_api_001_init_genesis_with_coins
      - vv_req_api_001_init_genesis_empty_coins
      - vv_req_api_001_double_genesis_rejected
      - vv_req_api_001_reopen_existing_store
    notes: "7 tests in dedicated file tests/api_001_tests.rs. CoinStore with RocksDB backend, CoinStoreConfig with defaults, CoinStoreError with genesis variants, init_genesis with Merkle tree + all secondary indices, re-open persistence verified."

  - id: API-002
    section: "Core Types"
    summary: "CoinRecord struct with all fields, derived methods, and chia-protocol interop conversions"
    status: verified
    spec_ref: "docs/requirements/domains/crate_api/specs/API-002.md"
    tests:
      - vv_req_api_002_all_fields_accessible
      - vv_req_api_002_new_creates_unspent_ff_false
      - vv_req_api_002_spend_marks_spent
      - vv_req_api_002_coin_id_matches_coin
      - vv_req_api_002_to_coin_state_maps_heights
      - vv_req_api_002_clone_round_trip_fields
      - vv_req_api_002_serde_bincode_roundtrip
      - vv_req_api_002_double_spend_overwrites_height
      - vv_req_api_002_to_coin_state_u32_boundary
      - vv_req_api_002_from_chia_unspent
      - vv_req_api_002_from_chia_spent
      - vv_req_api_002_to_chia_coin_record
      - vv_req_api_002_chia_roundtrip_resets_ff_eligible
    notes: "CoinRecord + ChiaCoinRecord (wire mirror until chia-protocol in dig-clvm graph exposes CoinRecord). Crate-root re-exports: CoinRecord, ChiaCoinRecord, CoinId, PuzzleHash. Interop maps spent_block_index 0 <-> None."

  - id: API-003
    section: "Core Types"
    summary: "CoinStoreConfig with builder pattern and defaults"
    status: verified
    spec_ref: "docs/requirements/domains/crate_api/specs/API-003.md"
    tests:
      - vv_req_api_003_defaults_match_spec_table
      - vv_req_api_003_default_backend_follows_feature_matrix
      - vv_req_api_003_builder_chaining_sets_all_fields
      - vv_req_api_003_builder_preserves_unset_fields
      - vv_req_api_003_config_clone_round_trip
      - vv_req_api_003_storage_backend_variants_constructible
      - vv_req_api_003_default_with_path_matches_default_plus_path
      - vv_req_api_003_coin_store_exposes_effective_config
      - vv_req_api_003_rocksdb_backend_opens_via_config
      - vv_req_api_003_lmdb_backend_opens_via_config
    notes: "config::StorageBackend enum vs storage::StorageBackend trait documented; full LMDB StorageBackend impl (STO-003 seed); RocksDB open uses CoinStoreConfig tuning; CoinStore retains config + config(); LMDB test run with lmdb-storage-only on CI-hostile full-storage Windows link."

  - id: API-004
