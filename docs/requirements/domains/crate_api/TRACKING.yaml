      - vv_req_api_003_storage_backend_variants_constructible
      - vv_req_api_003_default_with_path_matches_default_plus_path
      - vv_req_api_003_coin_store_exposes_effective_config
      - vv_req_api_003_rocksdb_backend_opens_via_config
      - vv_req_api_003_lmdb_backend_opens_via_config
    notes: "config::StorageBackend enum vs storage::StorageBackend trait documented; full LMDB StorageBackend impl (STO-003 seed); RocksDB open uses CoinStoreConfig tuning; CoinStore retains config + config(); LMDB test run with lmdb-storage-only on CI-hostile full-storage Windows link."

