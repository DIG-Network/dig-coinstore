    summary: "CoinStoreError enum with 15 variants and thiserror derives"
    status: draft
    spec_ref: "docs/requirements/domains/crate_api/specs/API-004.md"
    tests: []
    notes: "15 variants covering chain continuity, coin existence, spend validity, storage, genesis, and query errors. Debug+Clone+PartialEq+thiserror::Error."

