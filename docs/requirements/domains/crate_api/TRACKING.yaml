    section: "Construction"
    summary: "CoinStore::new(), CoinStore::with_config(), init_genesis() constructors"
    status: verified
    spec_ref: "docs/requirements/domains/crate_api/specs/API-001.md"
    tests:
      - vv_req_api_001_new_returns_ok
      - vv_req_api_001_with_config_returns_ok
      - vv_req_api_001_empty_before_genesis
      - vv_req_api_001_init_genesis_with_coins
      - vv_req_api_001_init_genesis_empty_coins
      - vv_req_api_001_double_genesis_rejected
