      - vv_req_api_002_double_spend_overwrites_height
      - vv_req_api_002_to_coin_state_u32_boundary
      - vv_req_api_002_from_chia_unspent
      - vv_req_api_002_from_chia_spent
      - vv_req_api_002_to_chia_coin_record
      - vv_req_api_002_chia_roundtrip_resets_ff_eligible
    notes: "CoinRecord + ChiaCoinRecord (wire mirror until chia-protocol in dig-clvm graph exposes CoinRecord). Crate-root re-exports: CoinRecord, ChiaCoinRecord, CoinId, PuzzleHash. Interop maps spent_block_index 0 <-> None."

  - id: API-003
