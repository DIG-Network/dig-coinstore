domain_id: storage
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: STO-001
    section: "Trait Abstraction"
    summary: "StorageBackend trait with get, put, delete, batch_write, prefix_scan, flush, compact"
    status: verified
    spec_ref: "docs/requirements/domains/storage/specs/STO-001.md"
    tests:
      - tests/sto_001_tests.rs
    notes: >
      Dedicated tests/sto_001_tests.rs: compile-time Send+Sync for WriteBatch/WriteOp and both backends when
      features enable; Rocks module covers dyn coercion, get/put, missing get, idempotent delete, prefix_scan (5),
      batch_write (3 puts + empty), unknown CF, flush/compact. LMDB module mirrors core semantics + empty batch.
      Trait docs expanded in src/storage/mod.rs (method semantics table + doc links).

  - id: STO-002
    section: "Backend Implementations"
    summary: "RocksDB backend with 12 column families"
    status: verified
    spec_ref: "docs/requirements/domains/storage/specs/STO-002.md"
    tests:
      - tests/sto_002_tests.rs
    notes: >
      tests/sto_002_tests.rs (feature rocksdb-storage): list_cf vs ALL_COLUMN_FAMILIES, per-CF put/get,
      isolation, reopen, dyn StorageBackend, 11→12 CF schema-evolution reopen, STO002_ROCKS_WRITE_BUFFER_BYTES
      vs STO-002 MiB table. src/storage/rocksdb.rs: per-CF options from schema constants, BloomProfile,
      FIFO on state_snapshots, global WAL/sync/parallelism; max_open_files=-1 for RocksDB FIFO requirement
      (CoinStoreConfig.rocksdb_max_open_files not applied at open). Deeper per-CF Rocks property checks → STO-004/STO-006.

  - id: STO-003
    section: "Backend Implementations"
    summary: "LMDB backend with 6 named databases"
    status: verified
    spec_ref: "docs/requirements/domains/storage/specs/STO-003.md"
    tests:
      - tests/sto_003_tests.rs
    notes: >
      Six physical DBs (coins, coins_by_ph, hints, hints_by_value, snapshots, metadata) with logical
      CF→DB routing + single-byte multiplex tags in src/storage/lmdb.rs; EnvFlags NO_TLS|NO_READ_AHEAD,
      max_dbs=8, map_size from CoinStoreConfig. tests/sto_003_tests.rs: open/list six names, dyn trait,
      MVCC snapshot via long-lived RoTxn, concurrent readers, map_size, reopen, isolation, prefix_scan,
      MapFull, round-trip all ALL_COLUMN_FAMILIES. StorageError::MapFull added in storage/mod.rs.

  - id: STO-004
    section: "Bloom Filter Configuration"
    summary: "Full bloom for point lookups, prefix bloom for puzzle hash CFs, no bloom for sequential CFs"
    status: verified
    spec_ref: "docs/requirements/domains/storage/specs/STO-004.md"
    tests:
      - tests/sto_004_tests.rs
    notes: >
      `sto004_bloom_plan_for_column_family` is the single plan source applied in `column_family_descriptor`:
      classic full-key SST bloom (`set_bloom_filter(_, false)`) at BLOOM_FILTER_BITS_PER_KEY for Full + Prefix32,
      `set_pin_l0_filter_and_index_blocks_in_cache(true)` when SST bloom enabled, `set_memtable_prefix_bloom_ratio`
      for Prefix32 only, all suppressed when `CoinStoreConfig::bloom_filter` is false (API-003). Verified by
      tests/sto_004_tests.rs matrix + open smoke with blooms off.

  - id: STO-005
    section: "Atomic Writes"
    summary: "WriteBatch atomic commit with single WAL fsync per block"
    status: verified
    spec_ref: "docs/requirements/domains/storage/specs/STO-005.md"
    tests:
      - tests/sto_005_tests.rs
    notes: >
      RocksDB `RocksDbBackend::batch_write` uses `DB::write_opt` with `WriteOptions::set_sync(true)` via
      `sto005_batch_write_options()` (durable single WAL flush per logical batch). LMDB path unchanged:
      one `write_txn` + `commit`. Verified by tests/sto_005_tests.rs (atomicity, empty batch, rollback on
      unknown CF, deterministic order, perf vs N single-op batches, full-storage Rocks/LMDB parity).

  - id: STO-006
    section: "Compaction Strategy"
    summary: "Level compaction for read CFs, FIFO for append CFs"
    status: verified
    spec_ref: "docs/requirements/domains/storage/specs/STO-006.md"
    tests:
      - tests/sto_006_tests.rs
    notes: >
      `column_family_descriptor` applies `sto006_apply_level_compaction_options` vs `sto006_apply_fifo_compaction_options`
      from `src/storage/rocksdb.rs`; `STO006_ROCKS_MAX_WRITE_BUFFER_NUMBER` in `schema.rs`; FIFO on `archive_coin_records`
      + `state_snapshots`; LMDB `compact` stays no-op. rust-rocksdb 0.22 `FifoCompactOptions` lacks `allow_compaction`
      binding (spec calls for false) — documented in code. Open benchmark row for write-stall monitoring remains.

  - id: STO-007
    section: "Feature Gates"
    summary: "Feature flags: lmdb-storage, rocksdb-storage, full-storage. Default: rocksdb-storage"
    status: gap
    spec_ref: "docs/requirements/domains/storage/specs/STO-007.md"
    tests: []
    notes: ""

  - id: STO-008
    section: "Serialization"
    summary: "Bincode serialization for CoinRecord and snapshots, key encoding in schema.rs"
    status: gap
    spec_ref: "docs/requirements/domains/storage/specs/STO-008.md"
    tests: []
    notes: ""
