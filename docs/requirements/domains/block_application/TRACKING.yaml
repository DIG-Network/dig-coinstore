    spec_ref: "docs/requirements/domains/block_application/specs/BLK-013.md"
    tests: []
    notes: ""

  - id: BLK-014
    section: "Chain Tip and Atomic Commit"
    summary: "Atomically update chain tip metadata in same WriteBatch. Swap in-memory state atomically."
