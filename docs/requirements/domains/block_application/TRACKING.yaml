domain_id: block_application
normative: NORMATIVE.md
verification: VERIFICATION.md

items:
  - id: BLK-001
    section: "Entry Point"
    summary: "apply_block() accepts BlockData, returns Result<ApplyBlockResult, CoinStoreError>. Atomic."
    status: done
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-001.md"
    tests: ["tests/blk_001_tests.rs"]
    notes: "Full pipeline implemented in coin_store.rs. 16 tests cover valid blocks, sequential chaining, all error variants, atomicity, and state root verification."

  - id: BLK-002
    section: "Height and Chain Continuity"
    summary: "Height continuity: block.height MUST equal self.height() + 1"
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-002.md"
    tests: []
    notes: ""

  - id: BLK-003
    section: "Height and Chain Continuity"
    summary: "Parent hash: block.parent_hash MUST match self.tip_hash(). Zero hash for genesis."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-003.md"
    tests: []
    notes: ""

  - id: BLK-004
    section: "Reward Coin Assertion"
    summary: "Height 0 has 0 coinbase coins. All others >= MIN_REWARD_COINS_PER_BLOCK (2)."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-004.md"
    tests: []
    notes: ""

  - id: BLK-005
    section: "Removal and Addition Validation"
    summary: "Every removal coin_id MUST exist and be unspent. Validated before mutations."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-005.md"
    tests: []
    notes: ""

  - id: BLK-006
    section: "Removal and Addition Validation"
    summary: "No addition coin MUST already exist. CoinAlreadyExists error."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-006.md"
    tests: []
    notes: ""

  - id: BLK-007
    section: "Coin Mutation"
    summary: "Additions stored with confirmed_height, spent_height=None, timestamp. FF-eligible tracking via same_as_parent."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-007.md"
    tests: []
    notes: ""

  - id: BLK-008
    section: "Coin Mutation"
    summary: "Spend marking with WHERE guard on unspent + post-mutation count assertion."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-008.md"
    tests: []
    notes: ""

  - id: BLK-009
    section: "State Root Verification"
    summary: "If expected_state_root provided, computed root MUST match. StateRootMismatch error."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-009.md"
    tests: []
    notes: ""

  - id: BLK-010
    section: "Observability"
    summary: "Block application timed. Warning if elapsed > BLOCK_APPLY_WARN_SECONDS (10s)."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-010.md"
    tests: []
    notes: ""

  - id: BLK-011
    section: "Hint Processing"
    summary: "Validate all hints in block.hints during Phase 1. Empty skipped, >32 bytes rejected."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-011.md"
    tests: []
    notes: ""

  - id: BLK-012
    section: "Hint Processing"
    summary: "Store validated hints during Phase 2 in same WriteBatch. Idempotent duplicates."
    status: gap
    spec_ref: "docs/requirements/domains/block_application/specs/BLK-012.md"
    tests: []
    notes: ""

